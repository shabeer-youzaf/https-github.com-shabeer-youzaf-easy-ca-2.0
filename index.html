<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Easy CA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            malayalam: ['"Anek Malayalam"', 'sans-serif'],
          },
          colors: {
            primary: 'var(--primary)',
            secondary: 'var(--secondary)',
            accent: 'var(--accent)',
            surface: 'var(--surface)',
            background: 'var(--background)',
            'text-main': 'var(--text-main)',
            'text-muted': 'var(--text-muted)',
            border: 'var(--border)',
          },
          boxShadow: {
            'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.3)',
            'glass-hover': '0 20px 40px 0 rgba(0, 0, 0, 0.4)',
            'glow': '0 0 20px rgba(99, 102, 241, 0.3)',
            'glow-strong': '0 0 30px rgba(99, 102, 241, 0.5)',
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'slide-up': 'slideUp 0.6s ease-out forwards',
            'fade-in': 'fadeIn 0.5s ease-out forwards',
            'pop-in': 'popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            },
            slideUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            popIn: {
              '0%': { transform: 'scale(0.8)', opacity: '0' },
              '100%': { transform: 'scale(1)', opacity: '1' },
            }
          }
        },
      },
    }
  </script>
<style>
  :root {
    /* Premium Midnight Theme */
    --background: #020617; /* Slate 950/Black */
    --surface: #0F172A;    /* Slate 900 */
    --surface-light: #1E293B; /* Slate 800 */
    
    --primary: #818CF8;    /* Indigo 400 */
    --primary-dark: #6366F1; /* Indigo 500 */
    --secondary: #F472B6;  /* Pink 400 */
    --accent: #2DD4BF;     /* Teal 400 */
    
    --text-main: #F8FAFC;  /* Slate 50 */
    --text-muted: #94A3B8; /* Slate 400 */
    --border: #1E293B;     /* Slate 800 */

    --glass-bg: rgba(15, 23, 42, 0.6);
    --glass-border: rgba(255, 255, 255, 0.08);
    --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
  }
  
  /* Light Mode Overrides (Clean & Crisp) */
  html.light {
    --background: #F8FAFC;
    --surface: #FFFFFF;
    --surface-light: #F1F5F9;
    --primary: #4F46E5;
    --secondary: #DB2777;
    --text-main: #0F172A;
    --text-muted: #64748B;
    --border: #E2E8F0;
    --glass-bg: rgba(255, 255, 255, 0.85);
    --glass-border: rgba(0, 0, 0, 0.05);
    --glass-shadow: 0 4px 20px 0 rgba(0, 0, 0, 0.05);
  }

  body {
    background-color: var(--background);
    color: var(--text-main);
    font-family: 'Plus Jakarta Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    transition: background-color 0.4s ease, color 0.4s ease;
    overflow-x: hidden;
  }
  
  /* Selection Color */
  ::selection {
    background: rgba(99, 102, 241, 0.3);
    color: var(--text-main);
  }

  /* --- Premium Components --- */
  
  .glass-panel {
    background: var(--glass-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 1.5rem;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  
  /* Buttons */
  .btn-primary {
    background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    color: white;
    padding: 0.875rem 1.75rem;
    border-radius: 1rem;
    font-weight: 700;
    letter-spacing: 0.025em;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
    position: relative;
    overflow: hidden;
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
    filter: brightness(1.1);
  }
  .btn-primary:active {
    transform: translateY(0);
  }

  .btn-secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 0.875rem 1.75rem;
    border-radius: 1rem;
    font-weight: 600;
    transition: all 0.3s ease;
  }
  .btn-secondary:hover {
    border-color: var(--primary);
    color: var(--primary);
    background: rgba(99, 102, 241, 0.05);
  }

  /* Scrollbar */
  ::-webkit-scrollbar {
    width: 6px;
  }
  ::-webkit-scrollbar-track {
    background: transparent;
  }
  ::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 10px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: var(--text-muted);
  }

  /* Toggle Switch */
  .theme-switch-wrapper {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .theme-switch {
    display: inline-block;
    height: 24px;
    position: relative;
    width: 44px;
  }
  .theme-switch input {
    display:none;
  }
  .slider {
    background-color: var(--surface-light);
    border: 1px solid var(--border);
    bottom: 0;
    cursor: pointer;
    left: 0;
    position: absolute;
    right: 0;
    top: 0;
    transition: .4s;
    border-radius: 34px;
  }
  .slider:before {
    background-color: var(--text-muted);
    bottom: 3px;
    content: "";
    height: 16px;
    left: 4px;
    position: absolute;
    transition: .4s;
    width: 16px;
    border-radius: 50%;
  }
  input:checked + .slider {
    background-color: var(--surface-light);
    border-color: var(--primary);
  }
  input:checked + .slider:before {
    transform: translateX(18px);
    background-color: var(--primary);
  }
</style>
<script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.29.1",
    "vite": "https://aistudiocdn.com/vite@^7.2.2",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
